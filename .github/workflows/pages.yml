# Publiceert de map /docs naar GitHub Pages (statische shell + iframe naar jouw live host).
# Eenmalig in de repo: Settings → Pages → Build and deployment → Source: GitHub Actions
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Optionele standaard live-URL (repo-variable LIVE_APP_URL)
        env:
          LIVE_APP_URL: ${{ vars.LIVE_APP_URL }}
        run: |
          node -e "
            const fs = require('fs');
            const u = (process.env.LIVE_APP_URL || '').trim();
            fs.writeFileSync('docs/live-default.json', JSON.stringify({ url: u }, null, 0));
          "
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
