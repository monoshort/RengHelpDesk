<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Inloggen · Toddie Helpdesk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f4f6f2;
      --surface: #fff;
      --border: #e2e6dc;
      --text: #3d4540;
      --heading: #1a211c;
      --muted: #6b7469;
      --accent: #4a7a2e;
      --accent-hover: #3d6626;
      --danger: #b42318;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "DM Sans", system-ui, sans-serif;
      background:
        radial-gradient(900px 420px at 50% -10%, rgba(74, 122, 46, 0.1), transparent 55%),
        var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      -webkit-font-smoothing: antialiased;
    }
    .shell {
      width: 100%;
      max-width: 400px;
    }
    .brand {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .brand-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: rgba(74, 122, 46, 0.12);
      color: var(--accent);
      margin-bottom: 0.75rem;
    }
    .brand h1 {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--heading);
      letter-spacing: -0.02em;
    }
    .brand p {
      margin: 0.35rem 0 0;
      font-size: 0.9rem;
      color: var(--muted);
    }
    .box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem 1.65rem;
      box-shadow: 0 8px 32px rgba(26, 33, 28, 0.08);
    }
    .context {
      font-size: 0.82rem;
      color: var(--muted);
      padding: 0.55rem 0.75rem;
      background: #f8faf6;
      border-radius: 8px;
      margin-bottom: 1rem;
      border: 1px solid var(--border);
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.4rem;
      font-size: 0.82rem;
      color: var(--heading);
    }
    input {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #fafbf9;
      color: var(--heading);
      font: inherit;
      font-size: 0.95rem;
    }
    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(74, 122, 46, 0.2);
    }
    button {
      width: 100%;
      margin-top: 1.15rem;
      font: inherit;
      font-weight: 600;
      font-size: 0.95rem;
      padding: 0.65rem 1rem;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: var(--accent-hover); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .err {
      margin-top: 0.75rem;
      font-size: 0.85rem;
      color: var(--danger);
      font-weight: 600;
    }
    .links {
      margin-top: 1.25rem;
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
    }
    .links a {
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
    }
    .links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="shell">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      </div>
      <h1>Toddie Helpdesk</h1>
      <p id="brandSubtitle">Veilig inloggen voor je team</p>
    </div>
    <div class="box">
      <p class="context" id="loginContext" hidden></p>
      <label for="password">Wachtwoord</label>
      <input id="password" type="password" autocomplete="current-password" autofocus />
      <p class="err" id="err" hidden role="alert"></p>
      <button type="button" id="submit">Doorgaan</button>
      <div class="links">
        <a href="/mail.html">← Mail</a>
        <a href="/instellingen.html" id="settingsLink" hidden>Instellingen</a>
      </div>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const rawNext = params.get('next');
    const safeNext =
      rawNext && rawNext.startsWith('/') && !rawNext.startsWith('//') ? rawNext : '/mail.html';

    const errEl = document.getElementById('err');
    const pwEl = document.getElementById('password');
    const submitBtn = document.getElementById('submit');
    const loginContext = document.getElementById('loginContext');
    const settingsLink = document.getElementById('settingsLink');

    if (safeNext.includes('instellingen')) {
      loginContext.hidden = false;
      loginContext.textContent = 'Na inloggen ga je naar Platforminstellingen.';
      document.title = 'Inloggen · Instellingen';
      settingsLink.hidden = false;
    }

    async function doLogin() {
      errEl.hidden = true;
      submitBtn.disabled = true;
      try {
        const res = await fetch('/api/dashboard/login', {
          method: 'POST',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pwEl.value }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          errEl.textContent = data.error || 'Onjuist wachtwoord';
          errEl.hidden = false;
          return;
        }
        location.href = safeNext;
      } catch {
        errEl.textContent = 'Netwerkfout — probeer opnieuw.';
        errEl.hidden = false;
      } finally {
        submitBtn.disabled = false;
      }
    }

    submitBtn.addEventListener('click', doLogin);
    pwEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
