<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Toddie helpdesk · Inloggen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
  <noscript><link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet" /></noscript>
  <style>
    :root {
      --bg: #faf9f7;
      --surface: #ffffff;
      --border: #e0e3db;
      --text: #444444;
      --heading: #212529;
      --muted: #6c7568;
      --accent: #558235;
      --accent-hover: #43672a;
      --danger: #a63c2a;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Quicksand", system-ui, sans-serif;
      background:
        radial-gradient(800px 400px at 0% 0%, rgba(85, 130, 53, 0.06) 0%, transparent 55%),
        var(--bg);
      color: var(--text);
      padding: 2rem;
      line-height: 1.5;
    }
    .box {
      max-width: 32rem;
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem 1.75rem;
      box-shadow: 0 4px 24px rgba(33, 37, 41, 0.06);
    }
    h1 {
      margin: 0 0 0.75rem;
      font-size: 1.25rem;
      color: var(--heading);
      font-weight: 700;
    }
    p {
      color: var(--muted);
      font-size: 0.9rem;
      margin: 0 0 0.5rem;
    }
    label {
      display: block;
      font-weight: 600;
      margin: 1rem 0 0.35rem;
      font-size: 0.85rem;
      color: var(--heading);
    }
    input {
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
      padding: 0.55rem 0.65rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #f6f7f3;
      color: var(--text);
      font: inherit;
    }
    input:focus {
      outline: 2px solid rgba(85, 130, 53, 0.35);
      outline-offset: 1px;
    }
    button {
      margin-top: 1.25rem;
      font: inherit;
      font-weight: 600;
      padding: 0.55rem 1.1rem;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: #ffffff;
      cursor: pointer;
    }
    button:hover {
      background: var(--accent-hover);
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .err {
      margin-top: 0.75rem;
      font-size: 0.85rem;
      color: var(--danger);
      font-weight: 600;
    }
    .foot {
      margin-top: 1.25rem;
      font-size: 0.85rem;
    }
    a {
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
    }
    a:hover {
      color: var(--accent-hover);
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Toddie helpdesk · Inloggen</h1>
    <p>Vul het dashboardwachtwoord in om verder te gaan.</p>
    <label for="password">Wachtwoord</label>
    <input id="password" type="password" autocomplete="current-password" autofocus />
    <p class="err" id="err" hidden></p>
    <button type="button" id="submit">Inloggen</button>
    <p class="foot"><a href="/">← Terug</a></p>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const rawNext = params.get('next');
    const safeNext =
      rawNext && rawNext.startsWith('/') && !rawNext.startsWith('//') ? rawNext : '/';

    const errEl = document.getElementById('err');
    const pwEl = document.getElementById('password');
    const submitBtn = document.getElementById('submit');

    async function doLogin() {
      errEl.hidden = true;
      const password = pwEl.value;
      submitBtn.disabled = true;
      try {
        const res = await fetch('/api/dashboard/login', {
          method: 'POST',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          errEl.textContent = data.error || 'Inloggen mislukt';
          errEl.hidden = false;
          return;
        }
        location.href = safeNext;
      } catch {
        errEl.textContent = 'Netwerkfout — probeer opnieuw.';
        errEl.hidden = false;
      } finally {
        submitBtn.disabled = false;
      }
    }

    submitBtn.addEventListener('click', doLogin);
    pwEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
